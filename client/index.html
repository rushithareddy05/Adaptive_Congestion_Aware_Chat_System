<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO / Description -->
    <meta name="description" content="Adaptive Congestion-Aware Real-Time Chat System" />

    <!-- Title (IMPORTANT for presentation) -->
    <title>Secure Real-Time Chat System</title>

    <!-- Optional: Google Font (clean UI) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #f5f7fa;
      }

      /* Optional loading screen */
      #loader {
        position: fixed;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: white;
        z-index: 9999;
        font-size: 18px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <!-- Optional Loader -->
    <div id="loader">Loading Chat System...</div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Remove loader after app loads -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        if (loader) loader.style.display = "none";
      });
    </script>
  </body>
</html>
